<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockMaster JS</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #0f172a; color: #fff; min-height: 100vh; margin: 0; }
.sidebar-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 8px; color: #94a3b8; cursor: pointer; }
.sidebar-link:hover { background: #1e293b; color: #fff; }
.sidebar-link.active { background: #4f46e5; color: #fff; }
.btn-primary { background: #4f46e5; color: #fff; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
.btn-primary:hover { background: #4338ca; }
.btn-secondary { background: #475569; color: #fff; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
.btn-danger { background: #ef4444; color: #fff; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
.form-input { width: 100%; background: #334155; border: 1px solid #475569; border-radius: 8px; padding: 8px 12px; color: #fff; outline: none; }
.form-input:focus { border-color: #4f46e5; }
.form-label { display: block; font-size: 14px; color: #94a3b8; margin-bottom: 4px; }
.badge { display: inline-block; padding: 2px 8px; font-size: 11px; font-weight: 600; border-radius: 9999px; }
.badge-in { background: #22c55e33; color: #4ade80; }
.badge-out { background: #ef444433; color: #f87171; }
.table-header { padding: 12px 16px; text-align: left; font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
.table-cell { padding: 12px 16px; font-size: 14px; color: #e2e8f0; }
.stock-low { color: #f87171; font-weight: 600; }
.stock-ok { color: #4ade80; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 50; }
.modal-content { background: #1e293b; border-radius: 12px; padding: 24px; width: 100%; max-width: 560px; margin: 0 16px; max-height: 90vh; overflow-y: auto; }
#auth-container { display: flex; min-height: 100vh; align-items: center; justify-content: center; }
#app-container { display: none; height: 100vh; }
.action-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px; border-radius: 4px; }
.action-btn:hover { background: #334155; }
.spinner { border: 3px solid #334155; border-top: 3px solid #4f46e5; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="auth-container">
  <div style="background:#1e293b;padding:32px;border-radius:16px;width:100%;max-width:400px;margin:16px;">
    <div style="text-align:center;margin-bottom:24px;">
      <h1 style="font-size:28px;font-weight:700;color:#818cf8;">StockMaster</h1>
      <p style="color:#94a3b8;margin-top:4px;">Sistema de Gestión de Inventarios</p>
    </div>
    <div id="auth-error" style="display:none;background:#ef444433;color:#f87171;padding:12px;border-radius:8px;margin-bottom:16px;font-size:14px;"></div>
    <form id="auth-form">
      <div style="margin-bottom:16px;">
        <label class="form-label">Email</label>
        <input type="email" id="auth-email" class="form-input" required placeholder="user@example.com">
      </div>
      <div style="margin-bottom:24px;">
        <label class="form-label">Contraseña</label>
        <input type="password" id="auth-password" class="form-input" required placeholder="••••••••">
      </div>
      <div style="display:flex;gap:8px;">
        <button type="submit" id="auth-submit-btn" class="btn-primary" style="flex:1;">Iniciar Sesión</button>
        <button type="button" id="auth-register-btn" class="btn-secondary" style="flex:1;">Registrarse</button>
      </div>
    </form>
  </div>
</div>

<div id="app-container">
  <aside style="width:240px;background:#1e293b;padding:16px;display:flex;flex-direction:column;flex-shrink:0;">
    <div style="margin-bottom:24px;">
      <h1 style="font-size:22px;font-weight:700;color:#818cf8;">StockMaster</h1>
      <p style="font-size:11px;color:#64748b;">Control de Inventarios</p>
    </div>
    <nav style="flex:1;display:flex;flex-direction:column;gap:4px;">
      <div class="sidebar-link active" data-view="dashboard">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Dashboard
      </div>
      <div class="sidebar-link" data-view="products">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Productos
      </div>
      <div class="sidebar-link" data-view="categories">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
        Categorías
      </div>
      <div class="sidebar-link" data-view="suppliers">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Proveedores
      </div>
      <div class="sidebar-link" data-view="transactions">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/></svg>
        Movimientos
      </div>
    </nav>
    <div style="border-top:1px solid #334155;padding-top:16px;margin-top:16px;">
      <div style="font-size:14px;color:#94a3b8;margin-bottom:8px;" id="user-info"></div>
      <button id="logout-btn" class="sidebar-link" style="color:#f87171;width:100%;background:none;border:none;text-align:left;">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>
  <main style="flex:1;overflow-y:auto;padding:24px;" id="view-container">
  </main>
</div>

<div id="modal-container"></div>

<script>
// ====================== DB ======================
function uuid(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0;return(c=='x'?r:r&3|8).toString(16)})}

const DB_KEY='sm_data';
let _db=null;

function getDB(){
  if(_db)return _db;
  try{
    const raw=localStorage.getItem(DB_KEY);
    if(raw)_db=JSON.parse(raw);
  }catch(e){}
  if(!_db)_db={products:[],categories:[],suppliers:[],transactions:[],users:[]};
  return _db;
}

function saveDB(){
  try{localStorage.setItem(DB_KEY,JSON.stringify(_db))}catch(e){}
}

function seed(){
  const db=getDB();
  if(db.categories.length>0)return;
  const cats=[
    {id:uuid(),name:'Electrónica',description:'Dispositivos y componentes electrónicos',created_at:new Date().toISOString()},
    {id:uuid(),name:'Oficina',description:'Suministros de oficina y papelería',created_at:new Date().toISOString()},
    {id:uuid(),name:'Limpieza',description:'Productos de limpieza e higiene',created_at:new Date().toISOString()}
  ];
  db.categories=cats;
  const sups=[
    {id:uuid(),name:'Distribuidora ABC',contact_name:'Carlos López',email:'carlos@abc.com',phone:'3001234567'},
    {id:uuid(),name:'Importadora Global',contact_name:'María García',email:'maria@global.com',phone:'3107654321'}
  ];
  db.suppliers=sups;
  db.products=[
    {id:uuid(),sku:'TEC-001',name:'Teclado Mecánico RGB',description:'Teclado mecánico con retroiluminación',price:180000,cost:120000,stock_quantity:25,min_stock:10,category_id:cats[0].id,supplier_id:sups[0].id,created_at:new Date().toISOString(),updated_at:new Date().toISOString()},
    {id:uuid(),sku:'MON-002',name:'Monitor 24" IPS',description:'Monitor Full HD 75Hz',price:650000,cost:480000,stock_quantity:8,min_stock:5,category_id:cats[0].id,supplier_id:sups[1].id,created_at:new Date().toISOString(),updated_at:new Date().toISOString()},
    {id:uuid(),sku:'OFI-001',name:'Resma Papel Carta',description:'Resma de 500 hojas',price:12000,cost:8500,stock_quantity:2,min_stock:15,category_id:cats[1].id,supplier_id:sups[0].id,created_at:new Date().toISOString(),updated_at:new Date().toISOString()}
  ];
  saveDB();
}

function esc(str){
  if(typeof str!=='string')return str||'';
  const d=document.createElement('div');
  d.textContent=str;
  return d.innerHTML;
}

// ====================== AUTH ======================
let _session=null;

function getSession(){
  try{
    const raw=localStorage.getItem('sm_session');
    if(!raw)return null;
    const s=JSON.parse(raw);
    if(s.expires_at<Date.now()){localStorage.removeItem('sm_session');return null}
    return s;
  }catch(e){return null}
}

function setSession(user){
  _session={user:{id:user.id,email:user.email},expires_at:Date.now()+86400000};
  localStorage.setItem('sm_session',JSON.stringify(_session));
}

function clearSession(){
  _session=null;
  localStorage.removeItem('sm_session');
}

function signIn(email,pass){
  const db=getDB();
  const user=db.users.find(u=>u.email===email&&u.password===pass);
  if(!user)return 'Credenciales inválidas';
  setSession(user);
  return null;
}

// ====================== API ======================
function getProducts(){
  const db=getDB();
  const cats=db.categories,sups=db.suppliers;
  return db.products.map(p=>({...p,categories:cats.find(c=>c.id===p.category_id)||null,suppliers:sups.find(s=>s.id===p.supplier_id)||null})).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

function getProduct(id){
  const db=getDB();
  const p=db.products.find(x=>x.id===id);
  if(!p)return null;
  return{...p,categories:db.categories.find(c=>c.id===p.category_id)||null,suppliers:db.suppliers.find(s=>s.id===p.supplier_id)||null};
}

function createProduct(data){
  const db=getDB();
  if(db.products.find(p=>p.sku===data.sku))return 'El SKU ya existe';
  const p={...data,id:uuid(),created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  db.products.push(p);
  saveDB();
  return null;
}

function updateProduct(id,updates){
  const db=getDB();
  const idx=db.products.findIndex(p=>p.id===id);
  if(idx===-1)return 'Producto no encontrado';
  db.products[idx]={...db.products[idx],...updates,updated_at:new Date().toISOString()};
  saveDB();
  return null;
}

function getCategories(){
  return(getDB().categories||[]).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

function createCategory(data){
  const db=getDB();
  const c={...data,id:uuid(),created_at:new Date().toISOString()};
  db.categories.push(c);
  saveDB();
}

function updateCategory(id,updates){
  const db=getDB();
  const idx=db.categories.findIndex(c=>c.id===id);
  if(idx===-1)return 'Categoría no encontrada';
  db.categories[idx]={...db.categories[idx],...updates};
  saveDB();
}

function getSuppliers(){
  return(getDB().suppliers||[]).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
}

function createSupplier(data){
  const db=getDB();
  const s={...data,id:uuid()};
  db.suppliers.push(s);
  saveDB();
}

function updateSupplier(id,updates){
  const db=getDB();
  const idx=db.suppliers.findIndex(s=>s.id===id);
  if(idx===-1)return 'Proveedor no encontrado';
  db.suppliers[idx]={...db.suppliers[idx],...updates};
  saveDB();
}

function getTransactions(){
  const db=getDB();
  const prods=db.products;
  return(db.transactions||[]).map(t=>({...t,products:prods.find(p=>p.id===t.product_id)||null})).sort((a,b)=>new Date(b.created_at||0)-new Date(a.created_at||0));
}

function createTransaction(data){
  const db=getDB();
  const idx=db.products.findIndex(p=>p.id===data.product_id);
  if(idx===-1)return 'Producto no encontrado';
  const qty=parseInt(data.quantity)||0;
  if(qty<1)return 'Cantidad inválida';
  if(data.type==='OUT'&&db.products[idx].stock_quantity<qty)return 'Stock insuficiente';
  if(data.type==='IN')db.products[idx].stock_quantity+=qty;
  else db.products[idx].stock_quantity-=qty;
  db.products[idx].updated_at=new Date().toISOString();
  const t={...data,id:uuid(),created_at:new Date().toISOString()};
  db.transactions.push(t);
  saveDB();
  return null;
}

function getDashboard(){
  const db=getDB();
  const prods=db.products,txns=db.transactions||[];
  return{
    totalProducts:prods.length,
    totalStock:prods.reduce((s,p)=>s+(p.stock_quantity||0),0),
    totalValue:prods.reduce((s,p)=>s+(parseFloat(p.cost)||0)*(p.stock_quantity||0),0),
    lowStock:prods.filter(p=>(p.stock_quantity||0)<=(p.min_stock||0)).length,
    totalIn:txns.filter(t=>t.type==='IN').reduce((s,t)=>s+(t.quantity||0),0),
    totalOut:txns.filter(t=>t.type==='OUT').reduce((s,t)=>s+(t.quantity||0),0)
  };
}

// ====================== UI ======================
const $=(id)=>document.getElementById(id);
const authContainer=$('auth-container');
const appContainer=$('app-container');
const viewContainer=$('view-container');
const modalContainer=$('modal-container');
const authError=$('auth-error');
const authForm=$('auth-form');
const authEmail=$('auth-email');
const authPassword=$('auth-password');
const authSubmitBtn=$('auth-submit-btn');
const authRegisterBtn=$('auth-register-btn');
const logoutBtn=$('logout-btn');
const userInfo=$('user-info');

let currentView='dashboard';

function fmt(n){return new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP',minimumFractionDigits:0}).format(Number(n)||0)}

function loading(){
  viewContainer.innerHTML='<div style="display:flex;justify-content:center;align-items:center;height:200px;"><div class="spinner"></div></div>'
}

function errMsg(m){
  return '<div style="background:#ef444433;color:#f87171;padding:16px;border-radius:8px;font-size:14px;">'+esc(m)+'</div>'
}

function openModal(html){
  modalContainer.innerHTML='<div class="modal-overlay" id="modal-overlay"><div class="modal-content">'+html+'</div></div>';
  $('modal-overlay').onclick=function(e){if(e.target===this)closeModal()};
}

function closeModal(){modalContainer.innerHTML=''}

function card(l,v,c){
  return '<div style="background:#1e293b;padding:20px;border-radius:12px;"><p style="color:#94a3b8;font-size:14px;">'+l+'</p><p style="font-size:28px;font-weight:700;margin-top:4px;color:'+c+';">'+v+'</p></div>'
}

function buildTable(headers,rows,empty,n){
  return '<div style="background:#1e293b;border-radius:12px;overflow:hidden;"><table style="width:100%;border-collapse:collapse;"><thead style="background:#334155;"><tr>'+headers.map(h=>'<th class="table-header">'+h+'</th>').join('')+'</tr></thead><tbody style="border-top:1px solid #334155;">'+(rows.length?rows.join(''):'<tr><td colspan="'+n+'" style="text-align:center;padding:32px;color:#64748b;font-size:14px;">'+empty+'</td></tr>')+'</tbody></table></div>'
}

function inGroup(l,i){
  return '<div style="margin-bottom:12px;"><label class="form-label">'+l+'</label>'+i+'</div>'
}

// ====================== AUTH UI ======================
function showAuth(){authContainer.style.display='flex';appContainer.style.display='none'}
function showApp(){authContainer.style.display='none';appContainer.style.display='flex'}

function setAuthError(msg){
  if(msg){authError.textContent=msg;authError.style.display='block'}
  else authError.style.display='none'
}

authForm.addEventListener('submit',async e=>{
  e.preventDefault();setAuthError(null);
  authSubmitBtn.disabled=true;authSubmitBtn.textContent='Ingresando...';
  const err=signIn(authEmail.value,authPassword.value);
  authSubmitBtn.disabled=false;authSubmitBtn.textContent='Iniciar Sesión';
  if(err)setAuthError(err);
  else afterLogin();
});

authRegisterBtn.addEventListener('click',async()=>{
  setAuthError(null);
  const e=authEmail.value,p=authPassword.value;
  if(!e||!p){setAuthError('Ingresa email y contraseña');return}
  authRegisterBtn.disabled=true;authRegisterBtn.textContent='Registrando...';
  const err=signUp(e,p);
  authRegisterBtn.disabled=false;authRegisterBtn.textContent='Registrarse';
  if(err)setAuthError(err);
  else afterLogin();
});

logoutBtn.addEventListener('click',()=>{clearSession();showAuth()});

function afterLogin(){
  const s=getSession();
  if(!s)return;
  userInfo.textContent=s.user.email;
  showApp();
  renderDashboard();
}

function checkAuth(){
  const s=getSession();
  if(s){userInfo.textContent=s.user.email;showApp();renderDashboard()}
  else showAuth()
}

// ====================== VIEWS ======================

// DASHBOARD
function renderDashboard(){
  currentView='dashboard';loading();
  try{
    const d=getDashboard();
    viewContainer.innerHTML=
      '<h2 style="font-size:22px;font-weight:700;margin-bottom:24px;">Dashboard</h2>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;">'+
        card('Productos Registrados',d.totalProducts,'#fff')+
        card('Stock Total (Unidades)',d.totalStock,'#fff')+
        card('Valor del Inventario',fmt(d.totalValue),'#818cf8')+
        card('Stock Bajo',d.lowStock,'#f87171')+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;">'+
        card('Entradas Totales',d.totalIn,'#4ade80')+
        card('Salidas Totales',d.totalOut,'#fbbf24')+
      '</div>';
  }catch(e){viewContainer.innerHTML=errMsg(e.message)}
}

// PRODUCTS
function renderProducts(){
  currentView='products';loading();
  try{
    const data=getProducts();
    const rows=data.map(p=>
      '<tr style="border-bottom:1px solid #334155;">'+
        '<td class="table-cell" style="font-family:monospace;font-size:12px;">'+esc(p.sku)+'</td>'+
        '<td class="table-cell">'+esc(p.name)+'</td>'+
        '<td class="table-cell">'+(p.categories?esc(p.categories.name):'—')+'</td>'+
        '<td class="table-cell">'+(p.suppliers?esc(p.suppliers.name):'—')+'</td>'+
        '<td class="table-cell">'+fmt(p.price)+'</td>'+
        '<td class="table-cell '+(p.stock_quantity<=p.min_stock?'stock-low':'stock-ok')+'">'+p.stock_quantity+'</td>'+
        '<td class="table-cell">'+p.min_stock+'</td>'+
        '<td class="table-cell"><div style="display:flex;gap:4px;">'+
          '<button class="action-btn" onclick="showTransactionForm(\''+p.id+'\',\''+esc(p.name).replace(/'/g,"\\'")+'\')" title="Movimiento">🔄</button>'+
          '<button class="action-btn" onclick="showProductForm(\''+p.id+'\')" title="Editar">✏️</button>'+
          '<button class="action-btn" onclick="deleteProduct(\''+p.id+'\')" title="Eliminar">🗑️</button>'+
        '</div></td>'+
      '</tr>');
    viewContainer.innerHTML=
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">'+
        '<h2 style="font-size:22px;font-weight:700;">Productos</h2>'+
        '<button class="btn-primary" onclick="showProductForm()">+ Nuevo Producto</button>'+
      '</div>'+
      buildTable(['SKU','Nombre','Categoría','Proveedor','Precio','Stock','Min','Acciones'],rows,'Sin productos registrados',8);
  }catch(e){viewContainer.innerHTML=errMsg(e.message)}
}

function showProductForm(id){
  if(id){
    const p=getProduct(id);
    if(!p){alert('Producto no encontrado');return}
    renderProductForm(p);
  }else renderProductForm(null);
}

function renderProductForm(p){
  const isEdit=!!p;
  const cats=getCategories(),sups=getSuppliers();
  openModal(
    '<h3 style="font-size:20px;font-weight:700;margin-bottom:16px;">'+(isEdit?'Editar':'Nuevo')+' Producto</h3>'+
    '<form id="product-form" style="display:flex;flex-direction:column;gap:0;">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+
        inGroup('SKU','<input type="text" name="sku" class="form-input" required value="'+(isEdit?esc(p.sku):'')+'">')+
        inGroup('Nombre','<input type="text" name="name" class="form-input" required value="'+(isEdit?esc(p.name):'')+'">')+
      '</div>'+
      inGroup('Descripción','<textarea name="description" class="form-input" rows="2">'+(isEdit?esc(p.description||''):'')+'</textarea>')+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+
        inGroup('Precio Venta','<input type="number" step="0.01" name="price" class="form-input" required value="'+(isEdit?p.price:'')+'">')+
        inGroup('Costo','<input type="number" step="0.01" name="cost" class="form-input" required value="'+(isEdit?p.cost:'')+'">')+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+
        inGroup('Stock Inicial','<input type="number" name="stock_quantity" class="form-input" required value="'+(isEdit?p.stock_quantity:'0')+'" '+(isEdit?'readonly':'')+'>'+(isEdit?'<p style="font-size:12px;color:#64748b;margin-top:4px;">Usa movimientos para ajustar stock</p>':''))+
        inGroup('Stock Mínimo','<input type="number" name="min_stock" class="form-input" required value="'+(isEdit?p.min_stock:'5')+'">')+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+
        inGroup('Categoría','<select name="category_id" class="form-input"><option value="">Sin categoría</option>'+cats.map(c=>'<option value="'+c.id+'"'+(isEdit&&p.category_id===c.id?' selected':'')+'>'+esc(c.name)+'</option>').join('')+'</select>')+
        inGroup('Proveedor','<select name="supplier_id" class="form-input"><option value="">Sin proveedor</option>'+sups.map(s=>'<option value="'+s.id+'"'+(isEdit&&p.supplier_id===s.id?' selected':'')+'>'+esc(s.name)+'</option>').join('')+'</select>')+
      '</div>'+
      '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">'+
        '<button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>'+
        '<button type="submit" class="btn-primary">'+(isEdit?'Actualizar':'Crear')+'</button>'+
      '</div>'+
    '</form>');
  $('product-form').addEventListener('submit',async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const data=Object.fromEntries(fd.entries());
    data.price=parseFloat(data.price)||0;
    data.cost=parseFloat(data.cost)||0;
    data.stock_quantity=parseInt(data.stock_quantity)||0;
    data.min_stock=parseInt(data.min_stock)||0;
    data.category_id=data.category_id||null;
    data.supplier_id=data.supplier_id||null;
    let err;
    if(isEdit){const{stock_quantity,...u}=data;err=updateProduct(p.id,u)}
    else err=createProduct(data);
    if(err){alert('Error: '+err);return}
    closeModal();renderProducts();
  });
}

function deleteProduct(id){
  if(!confirm('¿Eliminar este producto?'))return;
  const db=getDB();
  db.products = db.products.filter(p=>p.id!==id);
  saveDB();
  renderProducts();
}

// CATEGORIES

  try{

        '<div><h3 style="font-weight:600;font-size:18px;">'+esc(c.name)+'</h3>'+(c.description?'<p style="font-size:14px;color:#94a3b8;margin-top:4px;">'+esc(c.description)+'</p>':'')+'</div>'+
        '<div style="display:flex;gap:4px;flex-shrink:0;">'+
          '<button class="action-btn" onclick="showCategoryForm(\''+c.id+'\')">✏️</button>'+

      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">'+

        '<button class="btn-primary" onclick="showCategoryForm()">+ Nueva Categoría</button>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;">'+
        (cards.length?cards.join(''):'<p style="color:#64748b;">Sin categorías registradas</p>')+

function showCategoryForm(id){

    const c=getCategories().find(x=>x.id===id);

    renderCategoryForm(c);
  }else renderCategoryForm(null);
}

function renderCategoryForm(c){
  const isEdit=!!c;
  openModal(
    '<h3 style="font-size:20px;font-weight:700;margin-bottom:16px;">'+(isEdit?'Editar':'Nueva')+' Categoría</h3>'+

      inGroup('Nombre','<input type="text" name="name" class="form-input" required value="'+(isEdit?esc(c.name):'')+'">')+
      inGroup('Descripción','<textarea name="description" class="form-input" rows="3">'+(isEdit?esc(c.description||''):'')+'</textarea>')+
      '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">'+
        '<button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>'+
        '<button type="submit" class="btn-primary">'+(isEdit?'Actualizar':'Crear')+'</button>'+
      '</div>'+
    '</form>');
  $('category-form').addEventListener('submit',e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const data=Object.fromEntries(fd.entries());
    let err;
    if(isEdit)err=updateCategory(c.id,data);
    else createCategory(data);
    if(err){alert('Error: '+err);return}
    closeModal();renderCategories();
  });
}

function deleteCategory(id){
  if(!confirm('¿Eliminar esta categoría?'))return;
  const db=getDB();
  if(db.products.find(p=>p.category_id===id)){alert('No se puede eliminar: hay productos asociados');return}
  db.categories=db.categories.filter(c=>c.id!==id);
  saveDB();
  renderCategories();
}

// TRANSACTIONS
function renderTransactions(){
  currentView='transactions';loading();
  try{
    const data=getTransactions();
    const rows=data.map(t=>
      '<tr style="border-bottom:1px solid #334155;">'+
        '<td class="table-cell" style="font-size:12px;">'+(new Date(t.created_at).toLocaleString('es-CO'))+'</td>'+
        '<td class="table-cell">'+(t.products?esc(t.products.name):'—')+'</td>'+
        '<td class="table-cell" style="font-family:monospace;font-size:12px;">'+(t.products?esc(t.products.sku):'—')+'</td>'+
        '<td class="table-cell"><span class="'+(t.type==='IN'?'badge-in':'badge-out')+'">'+(t.type==='IN'?'ENTRADA':'SALIDA')+'</span></td>'+
        '<td class="table-cell" style="font-weight:600;">'+(t.quantity||0)+'</td>'+
        '<td class="table-cell" style="color:#94a3b8;">'+esc(t.reason||'—')+'</td>'+
      '</tr>');
    viewContainer.innerHTML=
      '<h2 style="font-size:22px;font-weight:700;margin-bottom:24px;">Historial de Movimientos</h2>'+
      buildTable(['Fecha','Producto','SKU','Tipo','Cantidad','Razón'],rows,'Sin movimientos registrados',6);
  }catch(e){viewContainer.innerHTML=errMsg(e.message)}
}

function showTransactionForm(productId,productName){
  openModal(
    '<h3 style="font-size:20px;font-weight:700;margin-bottom:16px;">Registrar Movimiento</h3>'+
    '<p style="color:#cbd5e1;margin-bottom:16px;">Producto: <span style="font-weight:600;">'+esc(productName)+'</span></p>'+
    '<form id="transaction-form">'+
      inGroup('Tipo','<select name="type" class="form-input" required><option value="IN">Entrada (IN)</option><option value="OUT">Salida (OUT)</option></select>')+
      inGroup('Cantidad','<input type="number" name="quantity" class="form-input" required min="1">')+
      inGroup('Razón','<select name="reason" class="form-input" required><option value="Compra">Compra</option><option value="Venta">Venta</option><option value="Ajuste">Ajuste</option><option value="Devolución">Devolución</option></select>')+
      '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">'+
        '<button type="button" class="btn-secondary" onclick="closeModal()">Cancelar</button>'+
        '<button type="submit" class="btn-primary">Registrar</button>'+
      '</div>'+
    '</form>');
  $('transaction-form').addEventListener('submit',async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const data=Object.fromEntries(fd.entries());
    data.product_id=productId;
    data.quantity=parseInt(data.quantity)||0;
    if(data.quantity<1){alert('La cantidad debe ser mayor a 0');return}
    const s=getSession();
    data.user_id=s?.user?.id||null;
    const err=createTransaction(data);
    if(err){alert('Error: '+err);return}
    closeModal();renderProducts();
  });
}

// ====================== NAV ======================
document.addEventListener('click',function(e){
  const link=e.target.closest('.sidebar-link[data-view]');
  if(!link)return;
  document.querySelectorAll('.sidebar-link[data-view]').forEach(l=>l.classList.remove('active'));
  link.classList.add('active');
  const view=link.dataset.view;
  switch(view){
    case 'dashboard':renderDashboard();break;
    case 'products':renderProducts();break;
    case 'categories':renderCategories();break;
    case 'suppliers':renderSuppliers();break;
    case 'transactions':renderTransactions();break;
  }
});

// ====================== BOOT ======================
seed();
checkAuth();
</script>
